<!-- IPG Property Tracker — Airtable-connected, multi-agent -->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --navy:#021A6B; --ink:#0a1438; --blue:#0540F2; --blue-lite:#3D99F5;
    --bg:#F5F7FB; --panel:#FFFFFF; --line:#E4E9F2; --muted:#6B7794; --text:#16203D;
    --amber:#F59E0B; --green:#16A34A; --slate:#94A3B8; --purple:#7C5CFF;
    --shadow:0 10px 30px rgba(2,26,107,.12); --r:12px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--text);background:var(--bg);overflow:hidden;-webkit-font-smoothing:antialiased}
  #app{display:grid;grid-template-columns:340px 1fr;height:100vh}

  .side{background:var(--navy);color:#fff;display:flex;flex-direction:column;min-width:0;min-height:0;height:100vh}
  .brand{padding:18px 20px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
  .wordmark{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.5px;font-size:16px}
  .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--blue),var(--blue-lite));display:grid;place-items:center;font-size:12px;font-weight:800}
  .subtitle{font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:rgba(255,255,255,.5);margin-top:8px;font-weight:600;display:flex;align-items:center;gap:7px}
  .conn{width:7px;height:7px;border-radius:50%;background:var(--slate)}
  .conn.live{background:var(--green);box-shadow:0 0 0 3px rgba(22,163,74,.25)}
  .conn.off{background:var(--amber)}

  .toolbar{padding:14px 18px;display:flex;flex-direction:column;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
  .search{position:relative}
  .search input{width:100%;padding:9px 12px 9px 32px;border-radius:9px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;font-size:13px;font-family:inherit}
  .search input::placeholder{color:rgba(255,255,255,.45)}
  .search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.5}
  .addbtn{width:100%;padding:10px;border:0;border-radius:9px;background:var(--blue);color:#fff;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:filter .15s,transform .05s}
  .addbtn:hover{filter:brightness(1.12)} .addbtn:active{transform:translateY(1px)}
  .addbtn.active{background:var(--amber);color:#1a1300}

  .filters{padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
  .flabel{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:rgba(255,255,255,.45);font-weight:700;margin:0 0 7px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .chip{padding:5px 10px;border-radius:20px;font-size:11.5px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.16);background:transparent;color:rgba(255,255,255,.72);font-family:inherit;display:flex;align-items:center;gap:6px;transition:.15s}
  .chip:hover{background:rgba(255,255,255,.08)}
  .chip.on{background:#fff;color:var(--navy);border-color:#fff}
  .chip .dot{width:8px;height:8px;border-radius:50%}

  .listhead{padding:11px 18px 6px;display:flex;align-items:center;justify-content:space-between}
  .listhead .count{font-size:11px;color:rgba(255,255,255,.5);font-weight:600;display:flex;align-items:center;gap:9px}
  .refresh{background:none;border:0;color:rgba(255,255,255,.5);cursor:pointer;padding:2px;display:grid;place-items:center}
  .refresh:hover{color:#fff}
  .refresh.spin svg{animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .list{flex:1;min-height:0;overflow-y:auto;padding:4px 12px 18px}
  .list::-webkit-scrollbar{width:8px}
  .list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:8px}
  .card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:11px 12px;margin:6px 0;cursor:pointer;transition:.15s}
  .card:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.18)}
  .card.sel{background:rgba(61,153,245,.16);border-color:var(--blue-lite)}
  .card .top{display:flex;align-items:flex-start;gap:9px}
  .card .stbar{width:4px;align-self:stretch;border-radius:3px;flex:none}
  .card .name{font-weight:700;font-size:13.5px;line-height:1.25;color:#fff}
  .card .addr{font-size:11.5px;color:rgba(255,255,255,.55);margin-top:2px;line-height:1.3}
  .card .meta{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap}
  .tag{font-size:10.5px;font-weight:600;padding:3px 7px;border-radius:6px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.82)}
  .tag.st{color:#06122e}
  .empty{padding:30px 20px;text-align:center;color:rgba(255,255,255,.5);font-size:13px;line-height:1.6}

  .mapwrap{position:relative}
  #map{position:absolute;inset:0;background:#dfe6f0}
  .maphint{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:600;background:var(--navy);color:#fff;padding:9px 16px;border-radius:30px;font-size:12.5px;font-weight:600;box-shadow:var(--shadow);display:none;align-items:center;gap:8px}
  .maphint.show{display:flex}
  .legend{position:absolute;bottom:18px;left:14px;z-index:600;background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px 13px;box-shadow:var(--shadow);font-size:11px}
  .legend .ltitle{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:7px}
  .legend .row{display:flex;align-items:center;gap:7px;margin:4px 0;color:var(--text);font-weight:500}
  .legend .dot{width:10px;height:10px;border-radius:50%}

  .pin-wrap{background:none;border:0}
  .pin{width:22px;height:22px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2.5px solid #fff;box-shadow:0 3px 8px rgba(2,26,107,.45);position:relative}
  .pin::after{content:'';position:absolute;top:50%;left:50%;width:7px;height:7px;border-radius:50%;background:#fff;transform:translate(-50%,-50%)}
  .pin.big{width:28px;height:28px;border-width:3px;z-index:1000}

  .detail{position:absolute;top:0;right:0;height:100%;width:380px;background:var(--panel);box-shadow:-12px 0 40px rgba(2,26,107,.16);z-index:700;transform:translateX(110%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
  .detail.open{transform:translateX(0)}
  .dhead{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
  .dhead h2{margin:0;font-size:14px;font-weight:700}
  .iconbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;display:grid;place-items:center;color:var(--muted);transition:.15s}
  .iconbtn:hover{background:var(--bg);color:var(--text)}
  .dbody{flex:1;min-height:0;overflow-y:auto;padding:18px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;font-weight:700;color:var(--muted);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:13.5px;font-family:inherit;color:var(--text);background:#fff}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(5,64,242,.1)}
  .field textarea{resize:vertical;min-height:62px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .num{font-variant-numeric:tabular-nums}
  .dfoot{padding:14px 18px;border-top:1px solid var(--line);display:flex;gap:10px}
  .btn{flex:1;padding:10px;border-radius:9px;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--text);transition:.15s}
  .btn:hover{background:var(--bg)}
  .btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
  .btn.primary:hover{filter:brightness(1.1)}
  .btn.primary:disabled{opacity:.55;cursor:default}
  .btn.danger{color:#C0263A;border-color:#f3cdd4;flex:none;width:44px;padding:10px 0}
  .btn.danger:hover{background:#fdf0f2}

  .vrow{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
  .vrow:last-child{border-bottom:0}
  .vrow .k{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700}
  .vrow .v{font-size:13.5px;font-weight:600;text-align:right;max-width:200px}
  .statusPill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700}
  .vnotes{margin-top:6px;font-size:13px;line-height:1.55;color:var(--text);white-space:pre-wrap}
  .photo{width:100%;height:185px;object-fit:cover;border-radius:10px;margin-bottom:16px;display:block;background:var(--bg);border:1px solid var(--line)}

  .toast{position:absolute;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);z-index:900;background:var(--ink);color:#fff;padding:10px 18px;border-radius:30px;font-size:13px;font-weight:600;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .cover{position:absolute;inset:0;background:rgba(245,247,251,.7);backdrop-filter:blur(2px);z-index:850;display:grid;place-items:center;color:var(--muted);font-size:13px;font-weight:600}
  .cover.hide{display:none}

  @media(max-width:820px){
    #app{grid-template-columns:1fr}
    .side{position:absolute;z-index:800;width:300px;height:100%;transform:translateX(-100%);transition:.28s}
    .detail{width:100%}
  }
</style>

<div id="app">
  <aside class="side">
    <div class="brand">
      <div class="wordmark"><span class="logo">IPG</span> Iconic Properties</div>
      <div class="subtitle"><span class="conn" id="conn"></span><span id="connText">Connecting…</span></div>
    </div>

    <div class="toolbar">
      <div class="search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input id="search" placeholder="Search address or owner…" />
      </div>
      <button class="addbtn" id="addBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>
        <span id="addLabel">Add property</span>
      </button>
    </div>

    <div class="filters">
      <p class="flabel">Status</p><div class="chips" id="statusChips"></div>
      <p class="flabel">Asset type</p><div class="chips" id="typeChips"></div>
    </div>

    <div class="listhead">
      <p class="flabel" style="margin:0">Tracked</p>
      <span class="count"><span id="count">0</span>
        <button class="refresh" id="refreshBtn" title="Refresh now">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 4v5h-5"/></svg>
        </button>
      </span>
    </div>
    <div class="list" id="list"></div>
  </aside>

  <div class="mapwrap">
    <div id="map"></div>
    <div class="maphint" id="hint">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/></svg>
      Click on the map to drop a pin
    </div>
    <div class="legend" id="legend"></div>
    <div class="toast" id="toast"></div>
    <div class="cover" id="cover">Loading properties…</div>

    <div class="detail" id="detail">
      <div class="dhead">
        <h2 id="dTitle">Property</h2>
        <button class="iconbtn" id="closeDetail" title="Close">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="dbody" id="dBody"></div>
      <div class="dfoot" id="dFoot"></div>
    </div>
  </div>
</div>

<script>
const API='/.netlify/functions/properties';
const POLL_MS=20000; // how often other agents' changes appear, in ms

const STATUSES=[
  {id:'tracking',  label:'Tracking',      color:'#3D99F5'},
  {id:'contacted', label:'Contacted',     color:'#0540F2'},
  {id:'discussion',label:'In discussion', color:'#7C5CFF'},
  {id:'contract',  label:'Under contract',color:'#F59E0B'},
  {id:'closed',    label:'Closed',        color:'#16A34A'},
  {id:'passed',    label:'Passed',        color:'#94A3B8'},
];
const TYPES=['Industrial','Retail','Office','Multifamily','Land','Mixed-use','Other'];
const STRUCTURE_USES=['Warehouse','Manufacturing','Office','Retail','Showroom','Auto / service','Mixed-use','Residential','Vacant / land','Other'];
const sColor=id=>(STATUSES.find(s=>s.id===id)||STATUSES[0]).color;
const sLabel=id=>(STATUSES.find(s=>s.id===id)||STATUSES[0]).label;
const fmt=n=>n||n===0?Number(n).toLocaleString('en-CA'):'';

let DATA=[];
let map, markers={}, selectedId=null, placingMode=false, editingId=null, booted=false;
const filters={status:new Set(),type:new Set(),q:''};
const $=id=>document.getElementById(id);

// ---------- API layer ----------
function setConn(state){ // 'live' | 'off'
  const c=$('conn'), t=$('connText');
  c.className='conn '+state;
  t.textContent= state==='live' ? 'Live · Airtable' : 'Offline — check setup';
}
async function apiList(){
  try{const r=await fetch(API);if(!r.ok)throw new Error((await r.json()).error||r.status);
    setConn('live');return (await r.json()).properties||[];}
  catch(e){setConn('off');if(booted)toast('Could not reach Airtable');return null;}
}
async function apiCreate(p){
  try{const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});
    if(!r.ok)throw new Error((await r.json()).error||r.status);return await r.json();}
  catch(e){toast('Save failed: '+e.message);return null;}
}
async function apiUpdate(id,p){
  try{const r=await fetch(API,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,...p})});
    if(!r.ok)throw new Error((await r.json()).error||r.status);return await r.json();}
  catch(e){toast('Update failed: '+e.message);return null;}
}
async function apiDelete(id){
  try{const r=await fetch(API+'?id='+encodeURIComponent(id),{method:'DELETE'});if(!r.ok)throw 0;return true;}
  catch(e){toast('Delete failed');return false;}
}

// ---------- map ----------
function initMap(){
  map=L.map('map',{zoomControl:true,attributionControl:false}).setView([49.19,-122.78],11);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19}).addTo(map);
  map.on('click',e=>{ if(placingMode) dropPin(e.latlng); });
}
function pinIcon(status,big){
  return L.divIcon({className:'pin-wrap',
    html:`<div class="pin ${big?'big':''}" style="background:${sColor(status)}"></div>`,
    iconSize:[22,22],iconAnchor:[11,22]});
}
function renderMarkers(){
  Object.values(markers).forEach(m=>map.removeLayer(m));markers={};
  visible().forEach(p=>{
    const m=L.marker([p.lat,p.lng],{icon:pinIcon(p.status,p.id===selectedId),draggable:true}).addTo(map);
    m.on('click',()=>select(p.id));
    m.on('dragend',async ev=>{
      const ll=ev.target.getLatLng();const t=DATA.find(d=>d.id===p.id);t.lat=ll.lat;t.lng=ll.lng;
      const u=await apiUpdate(p.id,{lat:ll.lat,lng:ll.lng});if(u)toast('Pin location updated');
    });
    markers[p.id]=m;
  });
}

// ---------- filtering ----------
function visible(){
  return DATA.filter(p=>{
    if(filters.status.size&&!filters.status.has(p.status))return false;
    if(filters.type.size&&!filters.type.has(p.type))return false;
    if(filters.q){const q=filters.q.toLowerCase();
      if(!(`${p.address} ${p.ownerName} ${p.name}`.toLowerCase().includes(q)))return false;}
    return true;
  });
}

// ---------- sidebar ----------
function renderChips(){
  $('statusChips').innerHTML=STATUSES.map(s=>
    `<div class="chip ${filters.status.has(s.id)?'on':''}" data-st="${s.id}"><span class="dot" style="background:${s.color}"></span>${s.label}</div>`).join('');
  $('typeChips').innerHTML=TYPES.map(t=>
    `<div class="chip ${filters.type.has(t)?'on':''}" data-ty="${t}">${t}</div>`).join('');
  $('statusChips').querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
    const id=c.dataset.st;filters.status.has(id)?filters.status.delete(id):filters.status.add(id);renderAll();});
  $('typeChips').querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
    const t=c.dataset.ty;filters.type.has(t)?filters.type.delete(t):filters.type.add(t);renderAll();});
}
function renderList(){
  const v=visible();$('count').textContent=v.length;
  if(!v.length){$('list').innerHTML=`<div class="empty">${DATA.length?'No properties match.<br>Adjust filters.':'No properties yet.<br>Click “Add property”, then the map.'}</div>`;return;}
  $('list').innerHTML=v.map(p=>`
    <div class="card ${p.id===selectedId?'sel':''}" data-id="${p.id}">
      <div class="top"><span class="stbar" style="background:${sColor(p.status)}"></span>
        <div style="min-width:0">
          <div class="name">${esc(p.name)||'Untitled'}</div>
          <div class="addr">${esc(p.address)||'No address'}</div>
          <div class="meta">
            <span class="tag">${esc(p.type)||'—'}</span>
            ${p.buildingSf?`<span class="tag num">${fmt(p.buildingSf)} SF</span>`:''}
            <span class="tag st" style="background:${sColor(p.status)}">${sLabel(p.status)}</span>
          </div>
        </div></div></div>`).join('');
  $('list').querySelectorAll('.card').forEach(c=>c.onclick=()=>select(c.dataset.id,true));
}
function renderLegend(){
  $('legend').innerHTML=`<div class="ltitle">Status</div>`+
    STATUSES.map(s=>`<div class="row"><span class="dot" style="background:${s.color}"></span>${s.label}</div>`).join('');
}
function renderAll(){renderChips();renderList();renderMarkers();}

// ---------- selection / detail ----------
function select(id,fly){
  selectedId=id;editingId=null;
  const p=DATA.find(d=>d.id===id);if(!p)return;
  if(fly)map.flyTo([p.lat,p.lng],14,{duration:.6});
  renderList();renderMarkers();openView(p);
}
function openView(p){
  $('dTitle').textContent=p.name||'Property';
  const row=(k,v)=>v?`<div class="vrow"><span class="k">${k}</span><span class="v">${v}</span></div>`:'';
  $('dBody').innerHTML=`
    ${p.image?`<img class="photo" src="${esc(p.image)}" alt="" onerror="this.style.display='none'"/>`:''}
    <div class="vrow"><span class="k">Status</span><span class="v">
      <span class="statusPill" style="background:${sColor(p.status)}22;color:${sColor(p.status)}">
      <span style="width:8px;height:8px;border-radius:50%;background:${sColor(p.status)}"></span>${sLabel(p.status)}</span></span></div>
    ${row('Address',esc(p.address))}
    ${row('Asset type',esc(p.type))}
    ${row('Structure use',esc(p.structureUse))}
    ${row('Building SF',p.buildingSf?`<span class="num">${fmt(p.buildingSf)} SF</span>`:'')}
    ${row('Lot size',p.lotSize?`<span class="num">${fmt(p.lotSize)} ${p.lotUnit||'sqft'}</span>`:'')}
    ${row('Zoning',esc(p.zoning))}
    ${row('Est. value',p.value?`<span class="num">$${fmt(p.value)}</span>`:'')}
    ${row('Owner name',esc(p.ownerName))}
    ${row('Owner / contact',esc(p.owner))}
    ${p.notes?`<div style="padding-top:12px"><span class="k" style="font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700">Notes</span><div class="vnotes">${esc(p.notes)}</div></div>`:''}`;
  $('dFoot').innerHTML=`<button class="btn primary" id="editBtn">Edit</button>
    <button class="btn danger" id="delBtn" title="Delete">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button>`;
  $('editBtn').onclick=()=>openEdit(p.id);
  $('delBtn').onclick=()=>del(p.id);
  $('detail').classList.add('open');
}
function structOpts(cur){
  const all=[...new Set([cur, ...STRUCTURE_USES].filter(Boolean))];
  return `<option value="" ${!cur?'selected':''}>—</option>`+
    all.map(o=>`<option value="${esc(o)}" ${o===cur?'selected':''}>${esc(o)}</option>`).join('');
}
function openEdit(id){
  editingId=id;
  const p=DATA.find(d=>d.id===id)||{type:'Industrial',status:'tracking',lotUnit:'sqft'};
  $('dTitle').textContent='Edit property';
  const opt=(arr,sel,val=x=>x,lab=x=>x)=>arr.map(o=>`<option value="${val(o)}" ${val(o)===sel?'selected':''}>${lab(o)}</option>`).join('');
  $('dBody').innerHTML=`
    <div class="field"><label>Property name</label><input id="f_name" value="${esc(p.name||'')}" placeholder="e.g. Fraser Hwy Industrial"/></div>
    <div class="field"><label>Address</label><input id="f_addr" value="${esc(p.address||'')}" placeholder="Street, City"/></div>
    <div class="grid2">
      <div class="field"><label>Asset type</label><select id="f_type">${opt(TYPES,p.type)}</select></div>
      <div class="field"><label>Status</label><select id="f_status">${opt(STATUSES,p.status,s=>s.id,s=>s.label)}</select></div></div>
    <div class="field"><label>Structure use</label><select id="f_struct">${structOpts(p.structureUse)}</select></div>
    <div class="grid2">
      <div class="field"><label>Building SF</label><input id="f_bsf" type="number" value="${p.buildingSf||''}" placeholder="0"/></div>
      <div class="field"><label>Lot size</label><input id="f_lot" type="number" value="${p.lotSize||''}" placeholder="0"/></div></div>
    <div class="grid2">
      <div class="field"><label>Lot unit</label><select id="f_unit">${opt(['sqft','acres'],p.lotUnit||'sqft')}</select></div>
      <div class="field"><label>Est. value (CAD)</label><input id="f_val" type="number" value="${p.value||''}" placeholder="0"/></div></div>
    <div class="field"><label>Zoning</label><input id="f_zone" value="${esc(p.zoning||'')}" placeholder="e.g. IP(2), RA1"/></div>
    <div class="field"><label>Owner name</label><input id="f_ownerName" value="${esc(p.ownerName||'')}" placeholder="e.g. 12345 BC Ltd."/></div>
    <div class="field"><label>Owner / contact</label><input id="f_owner" value="${esc(p.owner||'')}" placeholder="Phone / email"/></div>
    <div class="field"><label>Notes</label><textarea id="f_notes" placeholder="Outreach status, deal context…">${esc(p.notes||'')}</textarea></div>
    ${p.image?`<img class="photo" src="${esc(p.image)}" alt="" style="height:120px" onerror="this.style.display='none'"/>`:''}
    <p style="font-size:11.5px;color:var(--muted);margin:0">Add or change the photo in the Airtable “Photo” field — it appears here automatically.</p>`;
  $('dFoot').innerHTML=`<button class="btn" id="cancelBtn">Cancel</button><button class="btn primary" id="saveBtn">Save</button>`;
  $('cancelBtn').onclick=()=>{editingId=null;openView(DATA.find(d=>d.id===id)||p);};
  $('saveBtn').onclick=()=>commit(id);
  $('detail').classList.add('open');
}
async function commit(id){
  const g=k=>$(k).value.trim();
  const obj={name:g('f_name'),address:g('f_addr'),type:g('f_type'),status:g('f_status'),
    structureUse:$('f_struct').value,ownerName:g('f_ownerName'),
    buildingSf:g('f_bsf'),lotSize:g('f_lot'),lotUnit:g('f_unit'),value:g('f_val'),
    zoning:g('f_zone'),owner:g('f_owner'),notes:g('f_notes')};
  $('saveBtn').disabled=true;$('saveBtn').textContent='Saving…';
  const updated=await apiUpdate(id,obj);
  if(updated){const i=DATA.findIndex(d=>d.id===id);if(i>=0)DATA[i]=updated;editingId=null;renderAll();select(id);toast('Saved');}
  else{$('saveBtn').disabled=false;$('saveBtn').textContent='Save';}
}
async function del(id){
  if(!confirm('Delete this property for everyone? This cannot be undone.'))return;
  const ok=await apiDelete(id);if(!ok)return;
  DATA=DATA.filter(d=>d.id!==id);selectedId=null;editingId=null;closeDetail();renderAll();toast('Property deleted');
}
function closeDetail(){$('detail').classList.remove('open');selectedId=null;editingId=null;renderList();renderMarkers();}

// ---------- add ----------
function togglePlacing(on){
  placingMode=on??!placingMode;
  $('addBtn').classList.toggle('active',placingMode);
  $('addLabel').textContent=placingMode?'Click map to place…':'Add property';
  $('hint').classList.toggle('show',placingMode);
  map.getContainer().style.cursor=placingMode?'crosshair':'';
}
async function dropPin(latlng){
  togglePlacing(false);toast('Saving pin…');
  const base={lat:latlng.lat,lng:latlng.lng,name:'',address:'',type:'Industrial',status:'tracking',
    buildingSf:'',lotSize:'',lotUnit:'sqft',value:'',zoning:'',owner:'',notes:''};
  const created=await apiCreate(base);
  if(!created)return;
  DATA.push(created);selectedId=created.id;renderAll();openEdit(created.id);
}

// ---------- sync ----------
async function refresh(showSpin){
  if(showSpin)$('refreshBtn').classList.add('spin');
  const props=await apiList();
  if(showSpin)$('refreshBtn').classList.remove('spin');
  if(!props)return;
  DATA=props;
  if(selectedId&&!DATA.find(d=>d.id===selectedId))closeDetail();
  renderAll();
}
function startPolling(){
  setInterval(()=>{ if(!editingId&&!placingMode) refresh(false); },POLL_MS);
}

// ---------- misc ----------
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
let toastT;function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}

// ---------- boot ----------
(async function(){
  initMap();renderLegend();renderChips();
  const props=await apiList();
  DATA=props||[];booted=true;
  $('cover').classList.add('hide');
  renderAll();
  $('addBtn').onclick=()=>togglePlacing();
  $('closeDetail').onclick=closeDetail;
  $('refreshBtn').onclick=()=>refresh(true);
  $('search').oninput=e=>{filters.q=e.target.value;renderAll();};
  startPolling();
})();
</script>
